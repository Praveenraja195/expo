services:
  # The Python Web Service
  - type: web
    name: genesis-ai-engine
    runtime: docker
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: genesis-db
          property: connectionString
      - key: GROQ_API_KEY_1
        sync: false
      - key: GROQ_API_KEY_2
        sync: false
      - key: GROQ_API_KEY_3
        sync: false
      - key: GEMINI_API_KEY_1
        sync: false
      - key: GEMINI_API_KEY_2
        sync: false
      - key: GEMINI_API_KEY_3
        sync: false
      - key: N8N_WEBHOOK_URL
        sync: false
    plan: free

# The Managed PostgreSQL Database
databases:
  - name: genesis-db
    plan: free
